name: Update Fleet Orbit

on:
  schedule:
    - cron: "42 4 * * *" # 04:42 UTC (approx 05:42/06:42 Oslo time)

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: Update

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DeterminateSystems/determinate-nix-action@f4c468f2287f0f14a113841b41f2dc8957119519 # v3.19.0
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run update script
        run: ./update.sh

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.UPDATE_PAT }}
          commit-message: "Update Fleet Orbit"
          title: "Update Fleet Orbit"
          body: "Automated update generated by `update.sh`."
          branch: "automation/update-fleet"
          labels: "dependencies"

      - name: Enable auto-merge
        if: ${{ steps.create_pr.outputs.pull-request-operation == 'created' }}
        run: gh pr merge --auto --squash "${{ steps.create_pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.UPDATE_PAT }}
