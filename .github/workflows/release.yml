name: Tag and Release Orbit

on:
  workflow_run:
    workflows:
      [
        "CI",
      ]
    branches:
      - main
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GIT_AUTHOR_NAME: github-actions[bot]
  GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  GIT_COMMITTER_NAME: github-actions[bot]
  GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

jobs:
  tag_release:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    environment: Release

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      - name: Set up Cachix
        uses: cachix/cachix-action@97e5ff84d02b3b4f9936339f767e17f03c9252ed # v16
        with:
          name: fleet-nixos
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Resolve version
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run:
          |
          set -euo pipefail

          version=$(nix eval --raw .#packages.x86_64-linux.orbit.version)
          if [ -z "$version" ]; then
            echo "Failed to parse version from pkgs/default.nix" >&2
            exit 1
          fi

          tag="v${version}"
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: ${{ steps.resolve.outputs.tag_exists == 'false' }}
        shell: bash
        run:
          |
          git tag -a "${{ steps.resolve.outputs.tag }}" -m "Orbit ${{ steps.resolve.outputs.version }}"
          git push origin "${{ steps.resolve.outputs.tag }}"

      - name: Create release
        if: ${{ steps.resolve.outputs.release_exists == 'false' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run:
          |
          gh release create "${{ steps.resolve.outputs.tag }}" \
            --title "${{ steps.resolve.outputs.tag }}" \
            --generate-notes
